# BIC login theme — extends keycloak.v2 (PatternFly v5) and appends bic.css.
#
# Styling only. All visible copy (登录 / 用户名 / 密码 …) comes from Keycloak's
# built-in zh-CN message bundle, surfaced by the realm's internationalization
# setting (keycloak/realm-bic.json: defaultLocale=zh-CN). Nothing is hardcoded
# here.
parent=keycloak.v2
import=common/keycloak

# Re-list the parent bundle (css/styles.css) so keycloak.v2's styling is kept,
# then append our overrides. Overriding `styles` replaces the parent value, so
# the parent entry must be repeated; `stylesCommon` (PatternFly vendor css) is a
# separate key and is inherited untouched.
styles=css/styles.css css/bic.css

# One consistent BIC light look — drop keycloak.v2's OS-driven dark switch so
# the login page always reads as the portal's instrument-console light theme.
darkMode=false
